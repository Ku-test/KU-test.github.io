<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>INI Lab Test Page</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: #f7f7f7;
        color: #222;
      }
      .card {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 24px;
        width: min(90vw, 480px);
        text-align: center;
      }
      h1 {
        margin-top: 0;
        font-size: 1.5rem;
      }
      p {
        margin: 8px 0;
      }
      a {
        color: #0056b3;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>GitHub Pages Test OK</h1>
      <p>이 페이지가 보이면 배포가 정상입니다.</p>
      <p><a href="/">메인으로 돌아가기</a></p>
    </main>
  </body>
</html>
